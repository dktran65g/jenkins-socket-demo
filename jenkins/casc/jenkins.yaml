jenkins:
  systemMessage: "Socket Security - NodeGoat Demo"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: admin
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: socket-api-key
              secret: "${SOCKET_API_KEY}"
              description: "Socket Security API Key"

jobs:
  - script: |
      pipelineJob('nodegoat-socket-scan') {
        description('NodeGoat Socket Security Scan with Tier 1 Reachability')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url("${GITHUB_REPO_URL}")
                }
                branch('**')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
      queue('nodegoat-socket-scan')
