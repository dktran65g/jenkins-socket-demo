jenkins:
  systemMessage: "Socket Security - Jenkins Demo"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: admin
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: socket-api-key
              secret: "${SOCKET_SECURITY_API_TOKEN}"
              description: "Socket Security API Key"

jobs:
  - script: |
      def jobName = 'Tier-1-Reachability-Job-Template'
      pipelineJob(jobName) {
        description('Socket Security Scan with Tier 1 Reachability Template')
        parameters {
          stringParam('REPO_NAME', jobName, 'Repository name for Socket security scan')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url("${GITHUB_REPO_URL}")
                }
                branch('**')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
      // Do not auto-queue; let users trigger with parameters via Build with Parameters
